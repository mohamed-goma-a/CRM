<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM AI Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body>
    <div class="layout">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7L2 17C2 20.866 6.477 24 12 24C17.523 24 22 20.866 22 17V7L12 2Z"/>
            </svg>

            <div>
              <div class="sidebar-title">CRM AI</div>
              <div class="sidebar-subtitle">Dashboard</div>
            </div>
          </div>
        </div>

        <button class="nav-btn active" onclick="showTab('crm', event)">
          <span>Dashboard</span>
        </button>

        <button class="nav-btn" onclick="showTab('automations', event)">
          <span>Automations</span>
        </button>
      </aside>

      <!-- Main -->
      <main class="main-content">

        <!-- CRM -->
        <div id="crm" class="tab-content active">
          <div class="header">
            <h1 class="header-title">Sentiment Analysis</h1>
            <p class="header-subtitle">Analyze text and voice in real-time</p>
          </div>

          <div class="card">
            <div class="controls">
              <div class="input-wrapper">
                <input
                  id="userInput"
                  type="text"
                  placeholder="Type your message..."
                />
              </div>

              <button class="btn btn-primary" onclick="analyzeText()">
                Analyze
              </button>

              <button class="btn btn-danger" id="listenBtn" onclick="startListening()">
                Listen
              </button>
            </div>

            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Message</th>
                    <th>Sentiment</th>
                    <th>Score</th>
                  </tr>
                </thead>

                <tbody id="resultTable">
                  <tr>
                    <td colspan="3" class="empty-state">
                      No data yet. Start analyzing.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Automations -->
        <div id="automations" class="tab-content">
          <div class="header">
            <h1 class="header-title">Control Center</h1>
            <p class="header-subtitle">Manage workflows and automations</p>
          </div>
        </div>

      </main>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
